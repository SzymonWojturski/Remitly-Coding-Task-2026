version: "3.9"

services:
  db:
    image: postgres:15
    container_name: simplestock-db
    environment:
      POSTGRES_DB: simplestock
      POSTGRES_USER: simplestock
      POSTGRES_PASSWORD: simplestock
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simplestock"]
      interval: 5s
      timeout: 5s
      retries: 10

  app1:
    build: .
    container_name: simplestock-app1
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/simplestock
      SPRING_DATASOURCE_USERNAME: simplestock
      SPRING_DATASOURCE_PASSWORD: simplestock
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app2:
    build: .
    container_name: simplestock-app2
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/simplestock
      SPRING_DATASOURCE_USERNAME: simplestock
      SPRING_DATASOURCE_PASSWORD: simplestock
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: simplestock-nginx
    depends_on:
      - app1
      - app2
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  db_data: